nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

config:
  data: {}
  secretData: {}

gateway:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/jerrettdavis/jd.ai-gateway
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 15790
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: []
  persistence:
    enabled: true
    existingClaim: ""
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    mountPath: /home/jdai/.jdai
  startupProbe:
    path: /health/live
    periodSeconds: 5
    failureThreshold: 30
  readinessProbe:
    path: /health/ready
    periodSeconds: 10
    failureThreshold: 3
  livenessProbe:
    path: /health/live
    periodSeconds: 15
    failureThreshold: 3
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1

daemon:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/jerrettdavis/jd.ai-daemon
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 15790
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: []
  persistence:
    enabled: true
    existingClaim: ""
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    mountPath: /home/jdai/.jdai
  startupProbe:
    path: /health
    periodSeconds: 5
    failureThreshold: 30
  readinessProbe:
    path: /health
    periodSeconds: 10
    failureThreshold: 3
  livenessProbe:
    path: /health
    periodSeconds: 15
    failureThreshold: 3

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: jdai.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

tui:
  image:
    repository: ghcr.io/jerrettdavis/jd.ai-tui
    tag: latest

# OpenTelemetry / observability configuration
telemetry:
  enabled: false
  otlpEndpoint: ""          # e.g. http://otel-collector:4317
  otlpProtocol: grpc        # grpc | http/protobuf
  serviceName: jdai
  # Additional OTEL resource attributes
  attributes: {}

# Distributed workflow workers (JD.AI.Workflows.Distributed)
distributedWorker:
  enabled: false
  replicaCount: 2
  image:
    repository: ghcr.io/jerrettdavis/jd.ai-daemon
    tag: latest
    pullPolicy: IfNotPresent
  transport: inmemory        # inmemory | redis | azure-service-bus
  redis:
    connectionString: ""     # e.g. redis-master:6379
    streamKey: jdai:workflows
    consumerGroup: jdai-workers
  azureServiceBus:
    connectionStringSecretKey: azure-service-bus-connection-string
    queueName: jdai-workflows
  resources: {}
  env: []

# Batch/job mode: run a single agent workflow and exit
batchJob:
  enabled: false
  agent: ""
  workflow: ""
  image:
    repository: ghcr.io/jerrettdavis/jd.ai-daemon
    tag: latest
    pullPolicy: IfNotPresent
  resources: {}
  env: []

