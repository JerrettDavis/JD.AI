apiVersion: jdai.upss/v1
kind: Testing
id: testing.provider-tool-calling-regression
version: 1
status: draft
metadata:
  owners:
    - JerrettDavis
  reviewers:
    - upss-testing-strategy-agent
  lastReviewed: "2026-03-10"
  changeReason: Define regression coverage for provider-aware tool-calling behavior, including Claude tagged tool payload fallback.
verificationLevels:
  - unit
  - integration
behaviorRefs:
  - behavior.provider-tool-calling-execution
qualityRefs: []
coverageTargets:
  - scope: JD.AI.Core.Agents.AgentExecutionSettingsFactory
    target: "90%"
    metric: line
  - scope: JD.AI.Core.Agents.AgentLoop text-tool fallback
    target: "Claude tagged `<tool_use>` execution and safety confirmation covered"
    metric: scenario
  - scope: JD.AI.Core.Agents.Orchestration
    target: "provider-specific tool-call path coverage"
    metric: scenario
  - scope: JD.AI.Commands.SlashCommandRouter
    target: "/default shell and /default project shell command coverage"
    metric: scenario
  - scope: JD.AI.Core.Tools.ShellTools
    target: "configured default shell resolution (env, project, global, fallback) coverage"
    metric: scenario
  - scope: JD.AI.Core.Agents.AgentLoop text-tool fallback
    target: "orphaned tagged tool-use history is sanitized before next turn dispatch"
    metric: scenario
generationRules:
  - source: specs/behavior/provider-tool-calling-execution.yaml
    strategy: hybrid
trace:
  upstream:
    - specs/behavior/provider-tool-calling-execution.yaml
    - specs/interfaces/provider-tool-calling-contract.yaml
  downstream:
    ci:
      - .github/workflows/ci.yml
      - .github/workflows/pr-validation.yml
    release:
      - docs/operations/deployment.md
