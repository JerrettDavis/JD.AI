# JD.AI built-in compliance preset: PCI-DSS
# Suitable for organizations processing payment card data.
apiVersion: jdai/v1
kind: Policy
metadata:
  name: jdai/compliance/pci-dss
  scope: Organization
  priority: 1
spec:
  audit:
    enabled: true
    sink: file
  data:
    noExternalProviders:
      - '*'
    classifications:
      - name: PAN
        patterns:
          - '\b\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b'
          - '\b3[47]\d{13}\b'
        action: DenyAndAudit
        denyProviders:
          - '*'
      - name: CVV
        patterns:
          - '\b(?:CVV|CVC|CVV2|CVC2)[\s:]*\d{3,4}\b'
        action: DenyAndAudit
        denyProviders:
          - '*'
      - name: TrackData
        patterns:
          - '%B\d{13,16}\^[A-Z /]+\^\d{4}\d{3}[01]\d{3}\d+'
        action: DenyAndAudit
        denyProviders:
          - '*'
  sessions:
    retentionDays: 365
