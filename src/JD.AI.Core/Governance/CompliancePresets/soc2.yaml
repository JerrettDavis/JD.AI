# JD.AI built-in compliance preset: SOC 2
# Suitable as a baseline for service organizations requiring SOC 2 Type II compliance.
apiVersion: jdai/v1
kind: Policy
metadata:
  name: jdai/compliance/soc2
  scope: Organization
  priority: 1
spec:
  audit:
    enabled: true
    sink: file
  data:
    classifications:
      - name: SSN
        patterns:
          - '\b\d{3}-\d{2}-\d{4}\b'
        action: RedactAndAudit
      - name: CreditCard
        patterns:
          - '\b\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b'
        action: RedactAndAudit
      - name: APIKey
        patterns:
          - '\b(sk-[A-Za-z0-9]{32,}|AKIA[A-Z0-9]{16}|ghp_[A-Za-z0-9]{36})\b'
        action: DenyAndAudit
  sessions:
    retentionDays: 365
