name: E2E Smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true

permissions:
  contents: read
  checks: write

jobs:
  ui-smoke:
    name: UI Smoke (Reqnroll + Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore UI specs
        run: dotnet restore tests/JD.AI.Specs.UI/JD.AI.Specs.UI.csproj

      - name: Build UI specs
        run: >
          dotnet build tests/JD.AI.Specs.UI/JD.AI.Specs.UI.csproj
          --configuration Release
          --no-restore
          -p:IsTestProject=true
          /p:ContinuousIntegrationBuild=true

      - name: Install Playwright browsers
        shell: pwsh
        run: ./tests/JD.AI.Specs.UI/bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Start dashboard host
        run: |
          nohup dotnet run --project src/JD.AI.Dashboard.Wasm --configuration Release --urls http://127.0.0.1:5189 > dashboard.log 2>&1 &
          echo $! > dashboard.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5189 >/dev/null 2>&1; then
              echo "Dashboard is ready (attempt $i)"
              exit 0
            fi
            sleep 1
          done
          echo "Dashboard failed to start"
          cat dashboard.log || true
          exit 1

      - name: Run UI smoke tests
        env:
          DASHBOARD_BASE_URL: http://127.0.0.1:5189
        run: >
          dotnet test tests/JD.AI.Specs.UI/JD.AI.Specs.UI.csproj
          --configuration Release
          --no-build
          -p:IsTestProject=true
          --filter "Category=smoke"
          --logger "trx;LogFileName=ui-smoke-results.trx"

      - name: Publish UI test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            tests/JD.AI.Specs.UI/TestResults/**/*.trx
          check_name: UI Smoke Test Results
          comment_mode: off

      - name: Upload UI artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ui-smoke-artifacts
          path: |
            dashboard.log
            tests/JD.AI.Specs.UI/TestResults/**/*.trx

      - name: Stop dashboard host
        if: always()
        run: |
          if [ -f dashboard.pid ]; then
            kill "$(cat dashboard.pid)" || true
          fi

  vhs-smoke:
    name: CLI Smoke (VHS)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Publish JD.AI CLI (self-contained)
        run: >
          dotnet publish src/JD.AI/JD.AI.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output artifacts/vhs-smoke

      - name: Make CLI executable
        run: chmod +x artifacts/vhs-smoke/JD.AI

      - name: Install VHS, ttyd, and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs
          TTYD_VERSION="1.7.7"
          curl -fsSL "https://github.com/tsl0922/ttyd/releases/download/${TTYD_VERSION}/ttyd.x86_64" -o /usr/local/bin/ttyd
          sudo chmod +x /usr/local/bin/ttyd

      - name: Render VHS smoke tape
        run: vhs docs/tapes/ci-cli-smoke.tape

      - name: Verify generated VHS outputs
        run: |
          expected=(
            "docs/images/ci-cli-smoke.gif"
            "docs/images/ci-mcp-help.png"
            "docs/images/ci-plugin-help.png"
          )

          for attempt in $(seq 1 10); do
            missing=()
            for file in "${expected[@]}"; do
              if [ ! -f "$file" ]; then
                missing+=("$file")
              fi
            done

            if [ ${#missing[@]} -eq 0 ]; then
              echo "All VHS outputs found."
              exit 0
            fi

            echo "Waiting for VHS outputs (attempt ${attempt}/10): ${missing[*]}"
            sleep 1
          done

          echo "Missing VHS outputs after retries:"
          for file in "${missing[@]}"; do
            echo " - $file"
          done
          ls -la docs/images || true
          exit 1

      - name: Upload VHS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vhs-smoke-artifacts
          path: |
            docs/images/ci-cli-smoke.gif
            docs/images/ci-mcp-help.png
            docs/images/ci-plugin-help.png
